<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Family Drive Gallery</title>
    <script>
      // GitHub Pages SPA 路由重導向技巧
      // 當 GitHub Pages 對未知路徑回傳 404 時，此頁面會把路徑編碼成 query string
      // 再重導向至 index.html，由前端 router 還原正確路由。
      // segmentCount = 1 → 保留第一段路徑 (/family-drive-workspace)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
